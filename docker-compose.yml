version: '3.9'

services:
  app:
    image: phannamit/payment-hooks:latest
    build: .
    container_name: payment-hook-app
    ports:
      - '3010:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis.phannam.com
      - REDIS_PORT=6379
    restart: unless-stopped
