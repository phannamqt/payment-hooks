<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAM Pay — Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .header-logo img { height: 34px; border-radius: 6px; }
    .header-logo h1  { font-size: 16px; font-weight: 700; color: #f8fafc; }

    nav { display: flex; align-items: center; gap: 4px; flex: 1; }

    .nav-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .nav-link:hover  { background: #334155; color: #f8fafc; }
    .nav-link.active { background: #3b82f6; color: #fff; font-weight: 600; }

    .badge {
      background: #10b981;
      color: #fff;
      border-radius: 9999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge.error { background: #ef4444; }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #64748b;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 1.5s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }

    .controls-actions { display: flex; gap: 8px; margin-left: auto; }

    .btn {
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover   { opacity: 0.85; }
    .btn-ghost   { background: #334155; color: #e2e8f0; }
    .btn-danger  { background: #ef4444; color: #fff; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 16px;
    }

    @media (max-width: 480px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .stat-card:last-child { grid-column: 1 / -1; }
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
    }
    .stat-card .label { font-size: 11px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-card .value { font-size: 20px; font-weight: 700; color: #f8fafc; }
    .stat-card .value.green { color: #10b981; }

    @media (max-width: 480px) {
      .stat-card .value { font-size: 16px; }
    }

    /* ── Desktop table ── */
    .table-wrap {
      padding: 0 16px 24px;
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #1e293b; }
    th {
      text-align: left;
      padding: 10px 12px;
      color: #64748b;
      font-weight: 600;
      border-bottom: 1px solid #334155;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #1e293b; transition: background 0.1s; }
    tbody tr:hover { background: #1e293b; }
    td { padding: 10px 12px; vertical-align: middle; }

    .amount     { font-weight: 700; color: #10b981; white-space: nowrap; }
    .amount.out { color: #f87171; }

    .badge-bank {
      display: inline-block;
      background: #1d4ed8;
      color: #bfdbfe;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 700;
    }

    .content-cell { color: #94a3b8; font-size: 12px; }
    .date-cell    { color: #94a3b8; white-space: nowrap; font-size: 12px; }

    /* ── Mobile cards ── */
    .card-list { display: none; padding: 0 16px 24px; }

    .pay-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .pay-card.new-card { animation: highlight 2s ease-out; }

    .pay-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .pay-card-amount { font-size: 20px; font-weight: 700; color: #10b981; }
    .pay-card-amount.out { color: #f87171; }

    .pay-card-type {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 9999px;
    }
    .type-in  { background: #064e3b; color: #34d399; }
    .type-out { background: #450a0a; color: #f87171; }

    .pay-card-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 13px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pay-card-row .key {
      color: #64748b;
      font-size: 11px;
      min-width: 70px;
    }

    .pay-card-row .val { color: #e2e8f0; }

    .pay-card-desc {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #334155;
      font-size: 12px;
      color: #94a3b8;
      word-break: break-word;
    }

    .pay-card-time {
      font-size: 11px;
      color: #475569;
      margin-top: 6px;
    }

    /* ── Empty ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Highlight ── */
    @keyframes highlight {
      0%   { border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f633; }
      100% { border-color: #334155; box-shadow: none; }
    }

    .new-row { animation: highlight-row 2s ease-out; }
    @keyframes highlight-row {
      0%   { background: #1d4ed822; }
      100% { background: transparent; }
    }

    /* ── Responsive switch ── */
    @media (max-width: 768px) {
      .table-wrap { display: none; }
      .card-list  { display: block; }
      .header-logo h1 { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="header-logo">
    <img src="/logo.png" alt="NAM Pay" onerror="this.style.display='none'" />
    <h1>NAM Pay</h1>
  </a>
  <nav>
    <a href="/" class="nav-link active">Dashboard</a>
    <a href="/qr.html" class="nav-link">Tạo QR</a>
  </nav>
  <span id="status-badge" class="badge">●&nbsp;Live</span>
</header>

<div class="controls">
  <div class="live-dot">
    <span class="dot"></span>
    <span>Realtime</span>
  </div>
  <div class="controls-actions">
    <button class="btn btn-ghost" onclick="loadPayments()">Refresh</button>
    <button class="btn btn-danger" onclick="clearPayments()">Xóa tất cả</button>
  </div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="label">Tổng GD</div>
    <div class="value" id="stat-total">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Tổng tiền vào</div>
    <div class="value green" id="stat-amount">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Gần nhất</div>
    <div class="value" id="stat-latest" style="font-size:13px;line-height:1.4;">—</div>
  </div>
</div>

<!-- Desktop: table -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Thời gian</th>
        <th>NH nhận</th>
        <th>NH chuyển</th>
        <th>TK chuyển</th>
        <th>Tên người chuyển</th>
        <th>Số tiền</th>
        <th>Loại</th>
        <th>Nội dung</th>
      </tr>
    </thead>
    <tbody id="payment-body">
      <tr><td colspan="8"><div class="empty-state"><div class="icon">💳</div><div>Chưa có giao dịch nào</div></div></td></tr>
    </tbody>
  </table>
</div>

<!-- Mobile: cards -->
<div class="card-list" id="card-list">
  <div class="empty-state"><div class="icon">💳</div><div>Chưa có giao dịch nào</div></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  let lastTotal = 0;

  const fmt = n => new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(n);

  function fmtDate(s) {
    if (!s) return '—';
    try { return new Date(s).toLocaleString('vi-VN'); } catch { return s; }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function trunc(s, n) { return s.length > n ? s.slice(0,n)+'…' : s; }

  async function loadPayments() {
    try {
      const res = await fetch('/api/payments?limit=100');
      if (!res.ok) throw new Error(res.statusText);
      const { payments, total } = await res.json();

      setBadge(true);
      document.getElementById('stat-total').textContent = total;

      const totalIn = payments.filter(p=>p.transferType==='in').reduce((s,p)=>s+p.transferAmount,0);
      document.getElementById('stat-amount').textContent = payments.length ? fmt(totalIn) : '—';

      document.getElementById('stat-latest').textContent = payments.length > 0
        ? fmt(payments[0].transferAmount) + '\n' + (payments[0].transactionDate || fmtDate(payments[0].receivedAt))
        : '—';

      const isNew = total > lastTotal;
      renderTable(payments, isNew);
      renderCards(payments, isNew);
      lastTotal = total;
    } catch {
      setBadge(false);
    }
  }

  function setBadge(ok) {
    const b = document.getElementById('status-badge');
    b.textContent = ok ? '● Live' : '● Offline';
    b.className   = ok ? 'badge' : 'badge error';
  }

  function renderTable(payments, hasNew) {
    const tbody = document.getElementById('payment-body');
    if (!payments.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">💳</div><div>Chưa có giao dịch nào</div></div></td></tr>`;
      return;
    }
    tbody.innerHTML = payments.map((p, i) => {
      const parsed = p.parsed || {};
      return `<tr class="${hasNew && i===0 ? 'new-row' : ''}">
        <td class="date-cell">${p.transactionDate || fmtDate(p.receivedAt)}</td>
        <td><span class="badge-bank">${esc(p.gateway||'—')}</span></td>
        <td><span class="badge-bank" style="background:#7c3aed;">${esc(parsed.bankName||'—')}</span></td>
        <td style="font-family:monospace;font-size:12px;">${esc(parsed.fromAccount||'—')}</td>
        <td style="font-size:13px;">${esc(parsed.fromName||'—')}</td>
        <td class="amount ${p.transferType==='out'?'out':''}">${fmt(p.transferAmount)}</td>
        <td>${p.transferType==='in'
          ? '<span style="color:#10b981;font-weight:700;">↓ Vào</span>'
          : '<span style="color:#f87171;font-weight:700;">↑ Ra</span>'}</td>
        <td class="content-cell" title="${esc(p.content||'')}">${esc(trunc(parsed.description||p.content||'—',60))}</td>
      </tr>`;
    }).join('');
  }

  function renderCards(payments, hasNew) {
    const list = document.getElementById('card-list');
    if (!payments.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">💳</div><div>Chưa có giao dịch nào</div></div>`;
      return;
    }
    list.innerHTML = payments.map((p, i) => {
      const parsed  = p.parsed || {};
      const isIn    = p.transferType === 'in';
      return `<div class="pay-card ${hasNew && i===0 ? 'new-card' : ''}">
        <div class="pay-card-top">
          <div class="pay-card-amount ${isIn?'':'out'}">${fmt(p.transferAmount)}</div>
          <span class="pay-card-type ${isIn?'type-in':'type-out'}">${isIn?'↓ Tiền vào':'↑ Tiền ra'}</span>
        </div>
        ${parsed.bankName ? `<div class="pay-card-row">
          <span class="key">Từ</span>
          <span class="val"><span class="badge-bank" style="background:#7c3aed;">${esc(parsed.bankName)}</span></span>
        </div>` : ''}
        ${parsed.fromAccount ? `<div class="pay-card-row">
          <span class="key">TK</span>
          <span class="val" style="font-family:monospace;">${esc(parsed.fromAccount)}</span>
        </div>` : ''}
        ${parsed.fromName ? `<div class="pay-card-row">
          <span class="key">Tên</span>
          <span class="val">${esc(parsed.fromName)}</span>
        </div>` : ''}
        <div class="pay-card-row">
          <span class="key">NH nhận</span>
          <span class="val"><span class="badge-bank">${esc(p.gateway||'—')}</span></span>
        </div>
        <div class="pay-card-desc">${esc(parsed.description||p.content||'—')}</div>
        <div class="pay-card-time">${p.transactionDate || fmtDate(p.receivedAt)}</div>
      </div>`;
    }).join('');
  }

  async function clearPayments() {
    const password = prompt('Nhap mat khau de xoa toan bo du lieu:');
    if (password === null) return;
    if (!password.trim()) { alert('Vui long nhap mat khau'); return; }

    const res = await fetch('/api/payments', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      alert(err.message || 'Sai mat khau');
      return;
    }
    lastTotal = 0;
    await loadPayments();
  }

  const socket = io();
  socket.on('connect',    () => setBadge(true));
  socket.on('disconnect', () => setBadge(false));
  socket.on('new_payment', () => loadPayments());

  loadPayments();
</script>
</body>
</html>
