name: CI/CD Docker to Server

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  IMAGE_NAME: phannamit/payment-hooks

jobs:
  # 1️⃣ Build & push image lên Docker Hub
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # 2️⃣ Deploy lên server
  deploy-server:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/opt/payment-hooks"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin

            cd /opt/payment-hooks

            # --- 1. Tao file .env neu chua co ---
            if [ ! -f .env ]; then
              echo "PORT=3000" > .env
              echo "REDIS_HOST=redis.phannam.com" >> .env
              echo "REDIS_PORT=6379" >> .env
              echo "WEBHOOK_API_KEY=${{ secrets.WEBHOOK_API_KEY }}" >> .env
              echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            fi

            # --- 2. Pull image moi nhat ---
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest

            # --- 3. Restart container ---
            docker compose -f docker-compose.yml up -d --force-recreate app

            # --- 4. Don rac image cu ---
            docker image prune -f
